<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sign-up project</title>
    <link rel="stylesheet" href="sign-up.css">
</head>
<body>
    <div id="contenedor">
        <div id="picture-container">
        <img src="background-photo.jpg" alt="silla frente al lago" class="imagen-de-fondo">
            <div id="logo-container">
                <img src="odin-lined.png" alt="logo"> 
                <h2>ODIN</h2>     
            </div> 
        <p>Photo by Sijmen Van Hooff on Unsplash</p>    
        </div>
        <div id="intro">
            <p>This is not a real online service! You know you need something </p>
            <p>like this in your life to help you realize your deepest dreams.</p>
            <p>Sign up <span class="destacado">now</span> to get started</p>
            <p class="cta">You <span class="destacado">know</span> you want to.</p>
        </div>
        <div id="formulario">
            <form id="registro">
                <fieldset>
                    <legend>Let's do this!</legend>
                    
                    <div class="campo"> 
                        <label for="first-name">First Name</label>
                        <input type="text" name="first-name" id="first-name"/>
                    </div>
                   <div class="campo">
                        <label for="last-name">Last name</label>
                        <input type="text" name="last-name" id="last-name"/>
                    </div>
                    <div class="campo">
                        <label for="user-email">Email</label>
                        <input type="email" id="user-email" name="email"/>
                    </div>            
                    <div class="campo">
                        <label for="phone-number">Phone Number</label>
                        <input type="number" id="phone-number" name="phone-number" />
                    </div>    
                    <div class="campo">
                        <label for="psw">Password</label>
                        <input type="password" id="psw" name="password" minlength="5" required/>
                    </div>
                    <div class="campo">
                        <label for="confirm-psw">Confirm Password</label>
                        <input type="password" id="confirm-psw" name="password" minlength="5" required/>
                    </div>
            
                </fieldset>
            </form>
          
        </div>
        <div id="del-boton">
            <button type="submit" id="create-account">Create Account</button>
            <p id="sign-up">Already have an account? <span class="log-in">Log in</span></p>
        </div>
    </div>
</body>
</html>
